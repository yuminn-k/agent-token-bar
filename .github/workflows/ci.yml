name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -scheme TokenGarden -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            -configuration Debug build
